<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dead Poet — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --ash:#2c2824;
  --ash2:#342f2b;
  --border:#544e47;
  --text:#ede6db;
  --muted:#9a9088;
  --faint:#6a6259;
  --gold:#c8b87a;
  --gold2:#a89050;
  --white:#f7f1e8;
  --soul-blue:#7eb8f7;
  --purple:#9b6dff;
}

html,body{height:100%;overflow:hidden}

body{
  background:var(--ash);
  color:var(--text);
  font-family:'Cormorant Garamond',serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  position:relative;
  overflow:hidden;
}

/* Background geometry */
.bg-geo{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
  opacity:0.045;
}
.bg-geo svg{width:min(700px,100vw);height:min(700px,100vw)}

/* Large watermark glyph */
.bg-glyph{
  position:fixed;
  font-family:'Cinzel',serif;
  font-size:clamp(280px,50vw,520px);
  color:rgba(200,184,122,0.018);
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
  z-index:0;
  line-height:1;
  user-select:none;
}

/* Nav */
nav{
  position:fixed;top:0;left:0;right:0;
  padding:28px 48px;
  display:flex;align-items:center;justify-content:space-between;
  z-index:10;
  border-bottom:1px solid rgba(84,78,71,0.3);
}
.nav-logo{
  font-family:'Cinzel',serif;
  font-size:13px;letter-spacing:5px;text-transform:uppercase;
  color:var(--gold);text-decoration:none;
  transition:opacity .3s;
}
.nav-logo:hover{opacity:0.7}
.nav-back{
  font-family:'DM Mono',monospace;
  font-size:8px;letter-spacing:3px;text-transform:uppercase;
  color:var(--faint);text-decoration:none;
  transition:color .3s;
}
.nav-back:hover{color:var(--gold)}

/* Main content */
.content{
  position:relative;z-index:2;
  text-align:center;
  padding:0 32px;
  animation:fadeUp 1.4s cubic-bezier(.16,1,.3,1) both;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:translateY(0)}
}

.eyebrow{
  font-family:'DM Mono',monospace;
  font-size:8px;letter-spacing:5px;text-transform:uppercase;
  color:var(--faint);margin-bottom:36px;
  animation:fadeUp 1.4s .1s cubic-bezier(.16,1,.3,1) both;
}

.mark{
  font-family:'Cinzel',serif;
  font-size:clamp(14px,2vw,18px);
  color:var(--gold);
  margin-bottom:28px;
  animation:fadeUp 1.4s .15s cubic-bezier(.16,1,.3,1) both;
  animation:markPulse 3s ease-in-out infinite;
}
@keyframes markPulse{
  0%,100%{text-shadow:0 0 12px rgba(200,184,122,.4)}
  50%{text-shadow:0 0 28px rgba(200,184,122,.8),0 0 60px rgba(200,184,122,.2)}
}

.title{
  font-family:'Cinzel',serif;
  font-size:clamp(11px,1.8vw,14px);
  letter-spacing:8px;text-transform:uppercase;
  color:var(--muted);
  margin-bottom:52px;
  animation:fadeUp 1.4s .2s cubic-bezier(.16,1,.3,1) both;
}

.divider{
  width:48px;height:1px;
  background:linear-gradient(to right,transparent,var(--border),transparent);
  margin:0 auto 52px;
  animation:fadeUp 1.4s .25s cubic-bezier(.16,1,.3,1) both;
}

.body{
  font-size:clamp(16px,2.2vw,22px);
  font-style:italic;
  color:var(--text);
  line-height:1.8;
  max-width:480px;
  margin:0 auto 16px;
  animation:fadeUp 1.4s .3s cubic-bezier(.16,1,.3,1) both;
}

.body-sub{
  font-size:clamp(13px,1.4vw,16px);
  font-style:italic;
  color:var(--muted);
  line-height:1.8;
  max-width:360px;
  margin:0 auto 64px;
  animation:fadeUp 1.4s .35s cubic-bezier(.16,1,.3,1) both;
}

.back-btn{
  display:inline-block;
  font-family:'DM Mono',monospace;
  font-size:8px;letter-spacing:4px;text-transform:uppercase;
  color:var(--faint);text-decoration:none;
  border:1px solid var(--border);
  padding:14px 32px;
  transition:color .3s,border-color .3s,background .3s;
  animation:fadeUp 1.4s .4s cubic-bezier(.16,1,.3,1) both;
}
.back-btn:hover{
  color:var(--gold);
  border-color:var(--gold);
  background:rgba(200,184,122,.05);
}

/* Footer tag */
.footer-tag{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  font-family:'DM Mono',monospace;
  font-size:7px;letter-spacing:3px;text-transform:uppercase;
  color:var(--faint);
  z-index:10;white-space:nowrap;
}

/* Floating particles */
.particle{
  position:fixed;
  width:1px;height:1px;
  background:var(--gold);
  border-radius:50%;
  pointer-events:none;
  z-index:1;
}
</style>
</head>
<body>

<div class="bg-glyph">✦</div>

<div class="bg-geo">
  <svg viewBox="0 0 700 700" fill="none">
    <circle cx="350" cy="350" r="280" stroke="#c8b87a" stroke-width="0.6"/>
    <circle cx="350" cy="350" r="180" stroke="#c8b87a" stroke-width="0.5"/>
    <circle cx="350" cy="350" r="80"  stroke="#c8b87a" stroke-width="0.6"/>
    <polygon points="350,80 598,430 102,430"  stroke="#c8b87a" stroke-width="0.5" fill="none"/>
    <polygon points="350,620 598,270 102,270" stroke="#c8b87a" stroke-width="0.5" fill="none"/>
    <line x1="350" y1="70"  x2="350" y2="630" stroke="#c8b87a" stroke-width="0.3" opacity="0.5"/>
    <line x1="70"  y1="350" x2="630" y2="350" stroke="#c8b87a" stroke-width="0.3" opacity="0.5"/>
    <line x1="152" y1="152" x2="548" y2="548" stroke="#c8b87a" stroke-width="0.3" opacity="0.4"/>
    <line x1="548" y1="152" x2="152" y2="548" stroke="#c8b87a" stroke-width="0.3" opacity="0.4"/>
  </svg>
</div>

<nav>
  <a href="index.html" class="nav-logo">Dead Poet</a>
  <a href="index.html" class="nav-back">← Return</a>
</nav>

<div class="content">
  <p class="eyebrow">✦ &nbsp; Dead Poet &nbsp; ✦</p>
  <div class="mark">✦</div>
  <p class="title">Coming Soon</p>
  <div class="divider"></div>
  <p class="body">This chapter is still being written.</p>
  <p class="body-sub">Some things take the time they take.</p>
  <a href="index.html" class="back-btn">Return to Dead Poet</a>
</div>

<div class="footer-tag">Rise from the dead and reclaim your soul.</div>

<script>
// Spawn slow drifting gold motes
(function(){
  for(let i = 0; i < 18; i++){
    setTimeout(()=>{
      const p = document.createElement('div');
      p.className = 'particle';
      const x = 5 + Math.random() * 90;
      const dur = 12 + Math.random() * 16;
      const size = Math.random() > 0.7 ? 2 : 1;
      const delay = Math.random() * 8;
      p.style.cssText = `
        left:${x}vw;
        bottom:-4px;
        width:${size}px;height:${size}px;
        opacity:0;
        animation:particleRise ${dur}s ${delay}s ease-in-out infinite;
        box-shadow:0 0 ${size*3}px rgba(200,184,122,0.6);
      `;
      document.body.appendChild(p);
    }, i * 200);
  }

  if(!document.getElementById('particle-style')){
    const s = document.createElement('style');
    s.id = 'particle-style';
    s.textContent = `
      @keyframes particleRise {
        0%   { transform:translateY(0)   translateX(0);    opacity:0 }
        10%  { opacity:0.6 }
        50%  { transform:translateY(-45vh) translateX(${(Math.random()-.5)*60}px); opacity:0.3 }
        90%  { opacity:0.1 }
        100% { transform:translateY(-100vh) translateX(0); opacity:0 }
      }
    `;
    document.head.appendChild(s);
  }
})();
</script>

</body>
</html>
